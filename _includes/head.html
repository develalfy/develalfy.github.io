<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — {{ site.description | strip | truncate: 80 }}{% endif %}</title>
<meta name="description" content="{{ site.description }}">
<meta name="author" content="{{ site.author.name }}">

<link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">
<link rel="canonical" href="{{ page.url | absolute_url }}">

<meta property="og:type" content="profile">
<meta property="og:title" content="{{ site.title }}">
<meta property="og:description" content="{{ site.description }}">
<meta property="og:url" content="{{ site.url }}">
<meta property="og:image" content="{{ site.url }}/assets/images/og.png">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ site.title }}">
<meta name="twitter:description" content="{{ site.description }}">

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
{%- comment -%} JSON-LD Person schema {%- endcomment -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ site.author.name }}",
  "url": "{{ site.url }}",
  "email": "{{ site.author.email }}",
  "jobTitle": "Senior Backend Engineer",
  "sameAs": [
    "https://github.com/{{ site.data.data.sidebar.github }}",
    "https://linkedin.com/in/{{ site.data.data.sidebar.linkedin }}"
  ]
}
</script>
