<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- Generated by site build: title, description, OG, Twitter, JSON-LD -->
  {% assign p = site.data.data.sidebar %}

  <title>{{ site.title | append: " — " | append: p.tagline | strip_html | truncate: 80 }}</title>

  <meta name="description" content="{{ site.description }} · {{ p.tagline | strip_html }} · Based in {{ p.location }}.">

  <!-- Open Graph -->
  <meta property="og:type" content="profile">
  <meta property="og:site_name" content="{{ p.name }}">
  <meta property="og:title" content="{{ p.name }} — {{ p.tagline }}">
  <meta property="og:description" content="Senior Backend Engineer (PHP/Laravel) and AI automation builder. 1.5M+ users on my work, 10+ years shipping production systems.">
  <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}">
  <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="profile:first_name" content="Ashraf">
  <meta property="profile:last_name" content="Elalfi">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ p.name }} — {{ p.tagline }}">
  <meta name="twitter:description" content="Senior Backend Engineer (PHP/Laravel) and AI automation builder.">
  <meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/og.png">

  <!-- Apple pinned tab -->
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-title" content="{{ p.name }}">
  <link rel="mask-icon" href="{{ site.baseurl }}/assets/images/mask-icon.svg" color="#0066cc">

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ site.baseurl }}/assets/images/apple-touch-icon.png">

  <!-- Verification links (rel="me" pattern for IndieAuth/Mastodon) -->
  <link rel="me" href="https://github.com/{{ p.github }}">
  <link rel="me" href="https://linkedin.com/in/{{ p.linkedin }}">

  <!-- Fonts: Inter (SF Pro substitute) + JetBrains Mono (for stack tags / dates) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Canonical -->
  <link rel="canonical" href="{{ site.url }}{{ site.baseurl }}">

  <!-- Theme CSS -->
  <link id="theme-style" rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">

  <!-- JSON-LD Person schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "{{ p.name }}",
    "jobTitle": "Senior Backend Engineer",
    "description": "{{ site.description }}",
    "url": "{{ site.url }}{{ site.baseurl }}",
    "email": "mailto:{{ p.email }}",
    "telephone": "{{ p.phone }}",
    "image": "{{ site.url }}{{ site.baseurl }}/assets/images/profile.jpg",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Kuala Lumpur",
      "addressCountry": "MY"
    },
    "knowsAbout": [
      "PHP", "Laravel", "MySQL", "PostgreSQL", "AWS", "Docker",
      "RabbitMQ", "Redis", "AI Automation", "n8n", "GitLab CI",
      "PHPUnit", "Scrum", "Backend Engineering"
    ],
    "alumniOf": {
      "@type": "CollegeOrUniversity",
      "name": "Misr Higher Institute for Engineering and Technology"
    },
    "worksFor": {
      "@type": "Organization",
      "name": "Sam Media",
      "address": "Kuala Lumpur, Malaysia"
    },
    "sameAs": [
      "https://github.com/{{ p.github }}",
      "https://linkedin.com/in/{{ p.linkedin }}"
    ]
  }
  </script>
</head>
