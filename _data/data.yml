career-profile:
  title: Career Profile
  summary: |
    Senior Backend Engineer with 10+ years shipping production systems at scale — including a telecom billing platform serving 1.5M+ active subscribers across 90+ mobile network operators. I build reliable, high-availability backends and I automate the repetitive parts so engineering teams ship faster.

    My stack is PHP/Laravel, MySQL/PostgreSQL, AWS, Docker, RabbitMQ, and Redis. I've built test suites from scratch (0% → ~50% coverage across 21,000+ lines), designed duplicate-prevention systems for payment gateways, and debugged async queue misconfigurations that were causing 20+ daily Sentry errors in production. I hold a Certified Scrum Developer (CSD®) credential and I've led engineering squads delivering 100% of sprint goals with zero critical regressions.

    What sets me apart right now: I build AI tooling that makes engineering teams 2–3x more productive. I created SAMurAI — an n8n-powered CI pipeline that auto-reviews merge requests and posts inline GitLab comments. I founded an internal AI Agent Skills Hub (7 team-contributed skills) and built a Slack bot that lets non-technical teammates query production databases in plain English. I'm currently based in Kuala Lumpur and open to senior backend and AI engineering roles globally.

    Feel free to connect or reach me at iam@develalfy.me.

    You can download my CV from [Here](https://develalfy.me/Alfy_Backend_Developer_CV.pdf).

