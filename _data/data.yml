experiences:
  - role: Senior Software Engineer
    time: August 2022 - Present (4 years)
    company: Sam Media, WP. Kuala Lumpur
    details: |
      - Own production integrations with 90+ mobile network operators, maintaining 1.5M+ active subscribers on a PHP/Laravel high-availability billing platform.
      - Built PHPUnit test suite from zero across 20+ architectural layers — authored hundreds of test files covering 21,000+ lines, elevating overall codebase coverage to ~50%.
      - Engineered a 3-layer duplicate-subscription prevention system (DB partial unique index + model lock + global guard) for Italian XRAcademy payment gateway, resolving 8 active duplicate subscriptions.
      - Built SAMurAI: AI-powered CI pipeline (n8n + GitLab) that auto-reviews every merge request and posts inline bug-flagging comments — cutting manual review overhead for the team.
      - Built SAM Assistant: Slack bot enabling conversational natural-language queries against production databases, adopted by both technical and non-technical staff across departments.
      - Founded internal AI Agent Skills Hub (Claude Code/Cursor/OpenCode) — grew to 7 team-contributed skills covering PHPUnit generation, PHP upgrades, and production log investigation via SSH.
      - Stack: PHP, Laravel, MySQL, PostgreSQL, GitLab CI, Jenkins, Docker, AWS, RabbitMQ, Redis, n8n, Sentry, Kibana.

  - role: Backend Developer & Squad Lead
    time: November 2018 - July 2022 (3 years 9 months)
    company: Areeb Group, Cairo, Egypt
    details: |
      - Led engineering squad for ~1 year on a large-scale investment management platform, achieving 100% sprint goal completion and zero critical regressions across all release cycles.
      - Drove PHPUnit test coverage from 0% to 40% on a greenfield codebase — established team-wide testing standards and code review practices.
      - Implemented CI/CD pipeline (Azure DevOps) enabling daily releases and eliminating all manual deployment steps for a 5+ engineer team.
      - Refactored core domain components to SOLID principles, measurably reducing regression rate and improving long-term maintainability.
      - Stack: Laravel, MySQL, PHPUnit, Mockery, Azure DevOps, Git-Flow, Postman.

  - role: Backend Developer
    time: November 2017 - November 2018 (1 year 1 month)
    company: Robusta Studio, Cairo, Egypt
    details: |
      - Delivered 10+ production web apps (Mountain View, Faragalla, DAN, Gazef, Trackmena, Couponat, Supermama, Coach to Win, Go Bus, Coast82, AXA) across e-commerce, transport, and marketplace verticals — each shipped on schedule with Laravel/PHP.
      - Architected multi-database, multi-tenant solutions deployed on AWS + Docker, achieving zero-downtime releases for all client platforms.
      - Integrated third-party APIs and payment gateways including insurance (AXA) and ticketing (Go Bus), handling end-to-end backend logic, data modeling, and API contracts.
      - Maintained a PHP/WordPress hybrid stack, covering caching, query optimization, and server-side performance tuning.
      - Stack: Laravel, PHP, MySQL, PostgreSQL, AWS, Docker, JavaScript, WordPress.

  - role: Backend Developer
